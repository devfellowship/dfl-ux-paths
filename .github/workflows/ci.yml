name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest  # public repo: self-hosted dfl-runner is blocked (allows_public=false). Authorized Tainan TG 2026-06-06. devfellowship PRIVATE repos stay dfl-runner.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Type check
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Smoke run CLI
        run: node bin/cli.js --version

      - name: Validate example flows.json (v1.2)
        run: node bin/cli.js validate examples/lesson-studio-web.flows.json

      - name: Smoke resolve-routes (standalone bin)
        run: node bin/resolve-routes.mjs . || true

  yaml-action-lint:
    runs-on: ubuntu-latest  # public repo: self-hosted dfl-runner is blocked (allows_public=false). Authorized Tainan TG 2026-06-06. devfellowship PRIVATE repos stay dfl-runner.
    steps:
      - uses: actions/checkout@v7

      - name: actionlint
        uses: raven-actions/actionlint@v2
